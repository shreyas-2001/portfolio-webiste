<div class="projects-container">
    <div class="projects-grid">
        <div class="project-card glass-panel" *ngFor="let project of projects">
            <div class="project-image">
                <img [src]="project.imageUrl" [alt]="project.title" class="preview-img" />
            </div>

            <div class="project-details">
                <h3 class="project-title">{{ project.title }}</h3>
                <p class="project-description">{{ project.description }}</p>

                <ul class="project-features">
                    <li *ngFor="let feature of project.features">
                        <span class="bullet">✦</span> {{ feature }}
                    </li>
                </ul>

                <div class="tech-stack">
                    <span class="tech-tag glass-pill" *ngFor="let tech of project.techStack">
                        {{ tech }}
                    </span>
                </div>

                <div class="project-links">
                    <a [href]="project.liveLink" target="_blank" rel="noopener noreferrer"
                        class="link-btn text-gradient-primary">
                        View Project
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <line x1="10" y1="14" x2="21" y2="3"></line>
                        </svg>
                    </a>
                    <a [href]="project.githubLink" target="_blank" rel="noopener noreferrer"
                        class="link-btn text-gradient-primary">
                        GitHub
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4">
                            </path>
                            <path d="M9 18c-4.51 2-5-2-7-2"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
